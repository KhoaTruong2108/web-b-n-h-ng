<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Đăng Nhập - KhoaTruong</title>

  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}" />

  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "surface-tint": "#8433c4",
            "secondary-container": "#fe6f33",
            "outline": "#7e7384",
            "secondary-fixed": "#ffdbce",
            "on-tertiary-fixed": "#2b0052",
            "primary-container": "#9d4edd",
            "tertiary-fixed": "#efdbff",
            "on-primary-container": "#fffdff",
            "surface-bright": "#f8f9fa",
            "error-container": "#ffdad6",
            "primary-fixed": "#f2daff",
            "on-background": "#191c1d",
            "on-secondary-fixed-variant": "#802a00",
            "on-surface-variant": "#4d4353",
            "background": "#f8f9fa",
            "on-primary-fixed": "#2e004e",
            "surface-variant": "#e1e3e4",
            "on-secondary": "#ffffff",
            "tertiary-fixed-dim": "#dbb8ff",
            "primary": "#8231c2",
            "error": "#ba1a1a",
            "surface-container-low": "#f3f4f5",
            "surface-container": "#edeeef",
            "on-error-container": "#93000a",
            "on-tertiary-fixed-variant": "#6122a1",
            "on-tertiary-container": "#fffdff",
            "on-error": "#ffffff",
            "primary-fixed-dim": "#e0b6ff",
            "surface-dim": "#d9dadb",
            "on-secondary-container": "#5f1d00",
            "on-surface": "#191c1d",
            "on-secondary-fixed": "#380d00",
            "inverse-surface": "#2e3132",
            "secondary-fixed-dim": "#ffb59a",
            "surface": "#f8f9fa",
            "on-primary": "#ffffff",
            "on-tertiary": "#ffffff",
            "surface-container-lowest": "#ffffff",
            "inverse-on-surface": "#f0f1f2",
            "secondary": "#a83900",
            "outline-variant": "#d0c2d5",
            "surface-container-high": "#e7e8e9",
            "on-primary-fixed-variant": "#6a0baa",
            "inverse-primary": "#e0b6ff",
            "tertiary": "#783db9",
            "tertiary-container": "#9258d4",
            "surface-container-highest": "#e1e3e4"
          },
          borderRadius: {
            DEFAULT: "0.5rem",
            lg: "0.75rem",
            xl: "1.5rem",
            full: "9999px"
          },
          fontFamily: {
            headline: ["Plus Jakarta Sans"],
            body: ["Inter"],
            label: ["Inter"]
          }
        }
      }
    };
  </script>
</head>
<body class="bg-background min-h-screen flex flex-col relative overflow-x-hidden">
  <!-- TopAppBar -->
  <header class="fixed top-0 w-full z-50 flex justify-between items-center px-8 py-6 bg-transparent backdrop-blur-xl">
    <div class="text-2xl font-bold tracking-tight text-purple-700 dark:text-purple-300 font-headline">
      KhoaTruong
    </div>

    <div class="flex items-center gap-6">
      <button class="material-symbols-outlined text-slate-600 dark:text-slate-400 hover:opacity-80 transition-opacity">
        help_outline
      </button>
    </div>
  </header>

  <!-- Main -->
  <main class="flex-grow flex items-center justify-center relative px-4 py-20">
    <!-- Background -->
    <div class="absolute inset-0 z-0">
      <img
        alt=""
        class="w-full h-full object-cover"
        src="https://lh3.googleusercontent.com/aida-public/AB6AXuA6jKV91zgLeKT_vYjOmrbGmzZG5QPMBkKNhvfJGFe3E1tClnnQdKMT_hL0rRNfErsx1vUPFabIR1rSNrNCicOby3mzXfq2PyxV9yEe9nacwCC4Q4crY88Rf349fJTEcLlNM5UcBasx3BonBcipdUERPOHzlkTCBWPq7HA71y6g4KqM25dDIEIjXfD-JQhgKzgj9a9ap6DKIE5CdFrYDipKdGilDtn_5SQoaheSJoqG5kg7KVnzc3z70jLs-C8Tkl3d31mHYAXUA4M"
      />
      <div class="absolute inset-0 bg-gradient-to-b from-transparent to-surface/40"></div>
    </div>

    <!-- Login Container -->
    <div class="relative z-10 w-full max-w-[480px]">
      <div class="glass-container whisper-shadow rounded-xl p-10 md:p-12 border border-outline-variant/20">
        <div class="mb-8">
          <h1 class="text-3xl font-bold text-on-surface font-headline tracking-tight mb-2">
            Đăng Nhập
          </h1>
          <p class="text-on-surface-variant text-sm">
            Chào mừng bạn trở lại. Vui lòng nhập thông tin của bạn.
          </p>
        </div>

        <form class="space-y-6" id="loginForm">
          <div class="space-y-2">
            <label class="block text-xs font-bold text-on-surface-variant uppercase tracking-wider font-label px-1">
              Địa chỉ Email
            </label>
            <div class="relative">
              <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant text-xl">
                mail
              </span>
              <input
                class="w-full bg-surface-container-highest/50 border-none rounded-lg py-3.5 pl-12 pr-4 focus:ring-2 focus:ring-primary/40 transition-all text-on-surface placeholder:text-outline"
                placeholder="email@example.com"
                type="email"
                id="email"
              />
            </div>
          </div>

          <div class="space-y-2">
            <div class="flex justify-between items-center px-1">
              <label class="block text-xs font-bold text-on-surface-variant uppercase tracking-wider font-label">
                Mật khẩu
              </label>
              <a class="text-xs font-medium text-primary hover:opacity-80 transition-opacity" href="#">
                Quên mật khẩu?
              </a>
            </div>
            <div class="relative">
              <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant text-xl">
                lock
              </span>
              <input
                class="w-full bg-surface-container-highest/50 border-none rounded-lg py-3.5 pl-12 pr-12 focus:ring-2 focus:ring-primary/40 transition-all text-on-surface placeholder:text-outline"
                placeholder="••••••••"
                type="password"
                id="password"
              />
              <span
                class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant text-xl cursor-pointer hover:text-primary transition-colors"
                id="togglePassword"
              >
                visibility
              </span>
            </div>
          </div>

          <div class="flex items-center gap-3 py-2">
            <div class="flex items-center h-5">
              <input
                class="w-4 h-4 text-primary border-outline rounded focus:ring-primary"
                id="remember"
                type="checkbox"
              />
            </div>
            <label class="text-sm text-on-surface-variant select-none" for="remember">
              Ghi nhớ đăng nhập
            </label>
          </div>

          <button
            class="primary-gradient w-full py-4 rounded-lg text-white font-semibold text-base button-shadow active:scale-95 transition-all duration-200"
            type="submit"
          >
            Đăng Nhập
          </button>
        </form>

        <div class="mt-8 text-center">
          <p class="text-sm text-on-surface-variant">
            Chưa có tài khoản?
            <a class="text-secondary font-semibold hover:underline ml-1" href="#">
              Đăng Ký
            </a>
          </p>
        </div>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="w-full py-8 px-8 flex flex-col md:flex-row justify-between items-center gap-4 bg-transparent relative z-10">
    <div class="text-lg font-bold text-purple-700 dark:text-purple-300 font-headline">
      KhoaTruong
    </div>

    <div class="flex gap-6">
      <a class="text-sm text-slate-500 hover:text-purple-500 transition-colors" href="#">Privacy Policy</a>
      <a class="text-sm text-slate-500 hover:text-purple-500 transition-colors" href="#">Terms of Service</a>
      <a class="text-sm text-slate-500 hover:text-purple-500 transition-colors" href="#">Contact</a>
    </div>

    <div class="text-xs text-slate-500">© 2024 KhoaTruong. All rights reserved.</div>
  </footer>

  <script src="{{ url_for('static', filename='js/login.js') }}"></script>
</body>
</html>
