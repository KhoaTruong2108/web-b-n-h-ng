<!DOCTYPE html>
<html lang="vi" class="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}KhoaTruong{% endblock %}</title>

  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

  <link
    rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap"
  />
  <link
    rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
  />

  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            primary: "#8231c2",
            "primary-light": "#9d4edd",
            secondary: "#a83900",
            background: "#f8f9fa",
            surface: "#ffffff",
            text: "#191c1d",
            "text-muted": "#4d4353",
            border: "#d0c2d5",
            "card-bg": "rgba(255,255,255,0.85)"
          },
          fontFamily: {
            headline: ["Plus Jakarta Sans", "sans-serif"],
            body: ["Inter", "sans-serif"]
          },
          boxShadow: {
            soft: "0 10px 40px rgba(25, 28, 29, 0.06)",
            card: "0 12px 30px rgba(25, 28, 29, 0.05)"
          }
        }
      }
    };
  </script>

  <style>
    .material-symbols-outlined {
      font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24;
    }

    .glass {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }

    .section-container {
      max-width: 1280px;
      margin: 0 auto;
      padding-left: 2rem;
      padding-right: 2rem;
    }
  </style>

</head>

<body class="bg-background font-body text-text selection:bg-purple-200">
  <header class="fixed top-0 z-50 w-full border-b border-white/20 bg-white/85 backdrop-blur-xl shadow-soft">
    <nav class="section-container flex items-center justify-between py-5">
      <div class="text-2xl font-bold tracking-tight font-headline">KhoaTruong</div>

      <div class="flex items-center gap-4">
        <a href="{{ url_for('auth.login') }}" class="font-medium text-slate-600 hover:text-secondary transition">
          Login
        </a>
        <a href="{{ url_for('auth.signup') }}" class="rounded-lg bg-primary px-5 py-2.5 font-semibold text-white shadow-md hover:bg-primary-light transition">
          Sign Up
        </a>
      </div>
    </nav>
  </header>
</body>
</html>
